name: Backend CI/CD 

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
            
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push HTTP Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.http
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-http:latest
          
      - name: Build and push WS Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.websocket
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-ws:latest
          
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest images
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/collabxdraw-http:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/collabxdraw-ws:latest
            
            # Stop and remove existing containers if they exist
            sudo docker stop http-backend ws-backend || true
            sudo docker rm http-backend ws-backend || true
            
            # Run new containers
            sudo docker run -d --name http-backend -p 3000:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-http:latest
              
            sudo docker run -d --name ws-backend -p 8080:8080 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-ws:latest