name: Backend CI/CD

on:
  push:
    branches: ["main"]

jobs:

  ci:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push HTTP Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.http
          push: true
          platforms: linux/amd64
          tags: ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-http:latest

      - name: Build and push WS Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.websocket
          push: true
          platforms: linux/amd64
          tags: ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-ws:latest


  
  cd:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci   

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
                # Pull latest images
                sudo docker pull ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-http:latest
                sudo docker pull ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-ws:latest
                
                # Stop & remove old containers
                sudo docker stop http-backend ws-backend || true
                sudo docker rm http-backend ws-backend || true
  
                # Run HTTP backend
                sudo docker run -d --name http-backend --restart always -p 3000:3000 --memory="250m" --cpus="0.5" -e DATABASE_URL="${{ secrets.DATABASE_URL }}" -e JWT_SECRET="${{ secrets.JWT_SECRET }}" ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-http:latest
    
                # Run WS backend
                sudo docker run -d --name ws-backend --restart always -p 8080:8080 --memory="250m" --cpus="0.5" -e DATABASE_URL="${{ secrets.DATABASE_URL }}" -e JWT_SECRET="${{ secrets.JWT_SECRET }}" ${{ vars.DOCKERHUB_USERNAME }}/collabxdraw-ws:latest